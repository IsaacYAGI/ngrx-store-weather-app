<form [formGroup]="form">
  <label for="country">{{title}}</label> <br>
  <input type="text" name="country" id="country" formControlName="country">
</form>
<br><br>

@if (countriesLoading$ | async) {
<div><i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i></div>
}
@else {
@if (countries$ | async; as countries) {
<p-table [value]="countries" selectionMode="single" [(selection)]="selectedCountry"
  (onRowSelect)="onCountrySelected($event)" [tableStyle]="{ 'min-width': '50rem' }">
  <ng-template pTemplate="header">
    <tr>
      <th>Flag</th>
      <th>Name</th>
      <th>Latitude</th>
      <th>Longitude</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-country>
    <tr [pSelectableRow]="country">
      <td><img [src]="'https://flagcdn.com/32x24/' + country.country_code.toLowerCase() + '.png'" [alt]="country.name">
      </td>
      <td>{{ country.name }}</td>
      <td>{{ country.latitude }}</td>
      <td>{{ country.longitude }}</td>
    </tr>
  </ng-template>
</p-table>
}
}
